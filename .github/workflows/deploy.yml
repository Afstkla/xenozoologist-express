name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: givescompliments.com
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/xenozoologist-express
            git pull
            npm install
            cd client && npm install && npm run build && cd ..
            pm2 restart vibejam || pm2 start ecosystem.config.cjs
